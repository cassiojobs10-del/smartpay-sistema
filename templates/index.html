<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerência Financeira - Sistema</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #020617; 
            color: #ffffff; 
            font-family: 'Urbanist', sans-serif; 
            display: flex; 
            height: 100vh;
            overflow: hidden;
        }

        /* MENU LATERAL */
        .sidebar {
            width: 280px;
            background: #0b1121;
            border-right: 1px solid #1e3a8a;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 50px;
        }
        .logo-icon {
            background: #2563eb;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .logo-text {
            font-size: 18px;
            font-weight: 800;
            line-height: 1.2;
        }
        .menu-title {
            color: #475569;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            padding-left: 10px;
        }
        .menu-items { list-style: none; display: flex; flex-direction: column; gap: 5px; }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-radius: 10px;
            color: #94a3b8;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
        }
        .menu-item:hover { background: #1e293b; color: #fff; }
        .menu-item.active { background: #2563eb; color: #fff; }

        /* ÁREA DE CONTEÚDO PRINCIPAL */
        .main-content {
            flex-grow: 1;
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            padding: 40px 60px;
            overflow-y: auto;
        }

        /* FORMULÁRIO ENCAIXADO */
        .form-box { 
            background: #0b1121; 
            border: 1px solid #1e3a8a; 
            border-radius: 16px; 
            padding: 40px; 
            width: 100%; 
            max-width: 700px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.5); 
        }
        h1 { margin-top: 0; color: #ffffff; font-size: 32px; }
        .field-group { margin-bottom: 15px; }
        label { display: block; color: #ffffff; font-size: 14px; font-weight: 700; margin-bottom: 6px; }
        input { 
            background: #0f172a; border: 1px solid #1e3a8a; border-radius: 8px; 
            color: #ffffff; padding: 12px; width: 100%; font-family: 'Urbanist', sans-serif; font-size: 16px; 
        }
        input:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        .row-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-submit { 
            background: #2563eb; border: none; border-radius: 8px; color: #ffffff; 
            cursor: pointer; font-weight: 800; margin-top: 20px; padding: 18px; 
            width: 100%; font-size: 16px; text-transform: uppercase; transition: background 0.2s;
        }
        .btn-submit:hover { background: #1d4ed8; }
        .divider { border-top: 1px solid #1e3a8a; margin: 25px 0; padding-top: 20px; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo-area">
            <div class="logo-icon"><i class="fa-solid fa-wallet"></i></div>
            <div class="logo-text">Gerência<br>Financeira</div>
        </div>

        <div class="menu-title">Menu Principal</div>
        <ul class="menu-items">
            <li class="menu-item"><i class="fa-solid fa-chart-pie"></i> Dashboard</li>
            <li class="menu-item active"><i class="fa-solid fa-file-invoice-dollar"></i> Remessas Pagas</li>
            <li class="menu-item"><i class="fa-solid fa-list-check"></i> Outros Registros</li>
            <li class="menu-item"><i class="fa-solid fa-triangle-exclamation"></i> Particularidades</li>
        </ul>

        <div style="margin-top: auto; color: #475569; font-size: 12px; text-align: center;">
            <i class="fa-solid fa-user-shield"></i> Modo Admin
        </div>
    </nav>

    <main class="main-content">
        <div class="form-box">
            <h1>Controle de Remessas</h1>
            <p style="color: #94a3b8; margin-bottom: 30px;">Registro analítico de pagamentos de fornecedores e médicos.</p>

            <div class="row-grid">
                <div class="field-group">
                    <label>Data do Pagamento</label>
                    <input type="date" id="data_pagamento" required>
                </div>
                <div class="field-group">
                    <label>Nº/Nome da Remessa</label>
                    <input type="text" id="nome_remessa" placeholder="Ex: 7190 - c" required>
                </div>
            </div>

            <div class="row-grid">
                <div class="field-group">
                    <label>Qtd. Fornecedores</label>
                    <input type="number" id="qtd_fornecedores" value="0" min="0">
                </div>
                <div class="field-group">
                    <label>Qtd. Processos</label>
                    <input type="number" id="qtd_processos" value="0" min="0">
                </div>
            </div>

            <div class="divider">
                <p style="color: #3b82f6; font-weight: 700; margin-top: 0; font-size: 14px;">Gargalos de Complexidade</p>
                <div class="field-group">
                    <label>Processos de Contrato</label>
                    <input type="number" id="qtd_contratos" value="0" min="0">
                </div>
                <div class="row-grid">
                    <div class="field-group">
                        <label>Certidões Renovadas</label>
                        <input type="number" id="certidoes_renovadas" value="0" min="0">
                    </div>
                    <div class="field-group">
                        <label>Pagamentos Parciais</label>
                        <input type="number" id="pagamentos_parciais" value="0" min="0">
                    </div>
                </div>
            </div>

            <button class="btn-submit" onclick="registrarLote()">Registrar Produção</button>
        </div>
    </main>

    <script>
        document.getElementById('data_pagamento').valueAsDate = new Date();

        async function registrarLote() {
            const dados = {
                data_pagamento: document.getElementById('data_pagamento').value,
                nome_remessa: document.getElementById('nome_remessa').value,
                qtd_fornecedores: document.getElementById('qtd_fornecedores').value,
                qtd_processos: document.getElementById('qtd_processos').value,
                qtd_contratos: document.getElementById('qtd_contratos').value,
                certidoes_renovadas: document.getElementById('certidoes_renovadas').value,
                pagamentos_parciais: document.getElementById('pagamentos_parciais').value
            };

            if(!dados.nome_remessa) { alert("Preencha a remessa."); return; }

            try {
                const resposta = await fetch('/api/salvar-lote', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                const resultado = await resposta.json();

                if (resposta.ok) {
                    alert(`Sucesso! Remessa gerou ${resultado.pontos} pontos.`);
                    document.querySelectorAll('input[type="number"]').forEach(input => input.value = "0");
                    document.getElementById('nome_remessa').value = "";
                } else {
                    alert("Erro: " + resultado.mensagem);
                }
            } catch (erro) {
                alert("Erro de conexão com o servidor.");
            }
        }
    </script>
</body>
</html>
